<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOTEAL Pin</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    body {
      background: radial-gradient(circle at 50% 50%, hsl(222, 47%, 8%), hsl(224, 71%, 3%));
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }
    
    .popout-header {
      background: hsla(222, 47%, 9%, 0.9);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag; /* Permite arrastrar la ventana */
      cursor: move;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }
    
    .popout-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 12px;
    }
    
    .popout-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      user-select: text;
    }
    
    .popout-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      -webkit-app-region: no-drag; /* Los botones no deben arrastrar la ventana */
    }
    
    .btn-pin-action {
      background: none;
      border: none;
      color: var(--color-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all var(--transition-normal);
      padding: 4px;
      border-radius: 4px;
    }
    
    .btn-pin-action:hover {
      color: var(--text-main);
      background: hsla(222, 30%, 20%, 0.5);
    }
    
    .btn-pin-action.active {
      color: var(--color-secondary);
    }

    .btn-close-action {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all var(--transition-normal);
      padding: 4px;
      border-radius: 4px;
    }

    .btn-close-action:hover {
      color: var(--color-danger);
      background: rgba(255, 0, 0, 0.1);
    }

    /* Estilo del contenido Markdown renderizado */
    .popout-content h1, .popout-content h2, .popout-content h3 {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      margin-top: 16px;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .popout-content p {
      line-height: 1.6;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .popout-content ul, .popout-content ol {
      margin-bottom: 12px;
      padding-left: 20px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header class="popout-header">
    <div style="flex: 1; display: flex; align-items: center; margin-right: 12px; overflow: hidden;">
      <span class="popout-title" id="popout-title">Nota Flotante</span>
      <input type="text" id="popout-title-input" class="hidden" style="background: none; border: none; border-bottom: 1px solid var(--color-accent); color: var(--text-main); font-family: inherit; font-size: 0.95rem; font-weight: 700; outline: none; width: 100%; -webkit-app-region: no-drag; padding: 2px 0;">
      <span id="popout-status-badge" class="hidden" style="font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--color-secondary); font-weight: 600; margin-left: 8px; white-space: nowrap;"></span>
      <select id="popout-status-select" class="hidden" style="padding: 2px 6px; border-radius: 6px; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); font-size: 0.75rem; outline: none; margin-left: 8px; -webkit-app-region: no-drag; cursor: pointer; white-space: nowrap; max-width: 150px;"></select>
    </div>
    <div class="popout-actions">
      <button class="btn-pin-action" id="btn-edit" title="Editar Nota">
        <span class="material-symbols-outlined" style="font-size: 1.15rem;">edit</span>
      </button>
      <button class="btn-pin-action active" id="btn-pin" title="Mantener al frente">
        <span class="material-symbols-outlined" style="font-size: 1.15rem;">push_pin</span>
      </button>
      <button class="btn-close-action" id="btn-close" title="Cerrar">
        <span class="material-symbols-outlined" style="font-size: 1.15rem;">close</span>
      </button>
    </div>
  </header>

  <textarea id="popout-editor" class="hidden" style="flex: 1; background: none; border: none; resize: none; outline: none; font-family: var(--font-mono); font-size: 0.9rem; line-height: 1.6; color: var(--text-main); padding: 16px; overflow-y: auto; background: hsla(222, 30%, 4%, 0.2);"></textarea>

  <main class="popout-content markdown-body" id="popout-content">
    <!-- Contenido renderizado -->
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let alwaysOnTop = true;
      let isEditing = false;
      let noteData = null; // Guardará el objeto completo { id, projectId, title, content }

      const btnEdit = document.getElementById('btn-edit');
      const btnPin = document.getElementById('btn-pin');
      const btnClose = document.getElementById('btn-close');
      const popoutTitle = document.getElementById('popout-title');
      const popoutTitleInput = document.getElementById('popout-title-input');
      const popoutContent = document.getElementById('popout-content');
      const popoutEditor = document.getElementById('popout-editor');

      // Leer nota desde el hash de la URL
      try {
        const hash = window.location.hash.substring(1);
        if (hash) {
          noteData = JSON.parse(decodeURIComponent(hash));
          popoutTitle.textContent = noteData.title || (noteData.isTask ? 'Tarea Flotante' : 'Nota Flotante');
          popoutTitleInput.value = noteData.title || '';
          popoutEditor.value = noteData.content || '';
          
          if (noteData.isTask) {
            const popoutStatusBadge = document.getElementById('popout-status-badge');
            const popoutStatusSelect = document.getElementById('popout-status-select');
            popoutStatusBadge.classList.remove('hidden');
            popoutStatusBadge.textContent = noteData.status || '';
            
            if (noteData.statuses && Array.isArray(noteData.statuses)) {
              popoutStatusSelect.innerHTML = '';
              noteData.statuses.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                if (s === noteData.status) {
                  opt.selected = true;
                }
                popoutStatusSelect.appendChild(opt);
              });
            }
            btnEdit.title = "Editar Tarea";
          } else {
            btnEdit.title = "Editar Nota";
          }
          
          renderMarkdown();
        }
      } catch (e) {
        console.error('Error cargando nota/tarea flotante:', e);
        popoutContent.innerHTML = '<p style="color: var(--color-danger)">Error al cargar el contenido de la ventana flotante.</p>';
      }

      function renderMarkdown() {
        if (window.notealAPI && window.notealAPI.parseMarkdown) {
          popoutContent.innerHTML = window.notealAPI.parseMarkdown(noteData.content || '');
        } else {
          popoutContent.textContent = noteData.content || '';
        }
      }

      // Conmutar Modo Edición
      btnEdit.addEventListener('click', () => {
        if (!noteData) return;
        isEditing = !isEditing;
        if (isEditing) {
          // Entrar en modo edición
          popoutContent.classList.add('hidden');
          popoutEditor.classList.remove('hidden');
          popoutTitle.classList.add('hidden');
          popoutTitleInput.classList.remove('hidden');
          
          if (noteData.isTask) {
            document.getElementById('popout-status-badge').classList.add('hidden');
            document.getElementById('popout-status-select').classList.remove('hidden');
          }
          
          popoutTitleInput.value = noteData.title || '';
          popoutEditor.value = noteData.content || '';
          popoutEditor.focus();
          
          btnEdit.innerHTML = '<span class="material-symbols-outlined" style="font-size: 1.15rem;">save</span>';
          btnEdit.classList.add('active');
          btnEdit.title = "Guardar Cambios";
        } else {
          // Salir de modo edición y guardar
          noteData.title = popoutTitleInput.value.trim() || (noteData.isTask ? 'Tarea sin título' : 'Nota sin título');
          noteData.content = popoutEditor.value;
          
          popoutTitle.textContent = noteData.title;
          
          if (noteData.isTask) {
            noteData.status = document.getElementById('popout-status-select').value;
            const popoutStatusBadge = document.getElementById('popout-status-badge');
            popoutStatusBadge.textContent = noteData.status;
            popoutStatusBadge.classList.remove('hidden');
            document.getElementById('popout-status-select').classList.add('hidden');
          }
          
          renderMarkdown();
          
          popoutEditor.classList.add('hidden');
          popoutContent.classList.remove('hidden');
          popoutTitleInput.classList.add('hidden');
          popoutTitle.classList.remove('hidden');
          
          btnEdit.innerHTML = '<span class="material-symbols-outlined" style="font-size: 1.15rem;">edit</span>';
          btnEdit.classList.remove('active');
          btnEdit.title = noteData.isTask ? "Editar Tarea" : "Editar Nota";

          // Notificar actualización al proceso principal para sincronizar
          if (window.notealAPI) {
            if (noteData.isTask) {
              if (window.notealAPI.updateTask) {
                window.notealAPI.updateTask(noteData);
              }
            } else {
              if (window.notealAPI.updateNote && noteData.id) {
                window.notealAPI.updateNote(noteData);
              }
            }
          }
        }
      });

      // Cerrar ventana
      btnClose.addEventListener('click', () => {
        window.close();
      });

      // Pin / Always on top toggle
      btnPin.addEventListener('click', async () => {
        alwaysOnTop = !alwaysOnTop;
        if (window.notealAPI && window.notealAPI.toggleAlwaysOnTop) {
          const res = await window.notealAPI.toggleAlwaysOnTop(alwaysOnTop);
          if (res && res.success) {
            if (alwaysOnTop) {
              btnPin.classList.add('active');
              btnPin.style.color = '';
            } else {
              btnPin.classList.remove('active');
              btnPin.style.color = 'var(--text-muted)';
            }
          }
        }
      });
    });
  </script>
</body>
</html>
